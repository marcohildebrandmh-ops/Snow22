<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU TSL Dodger</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #050510;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        user-select: none;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        pointer-events: none;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      }
      h1 {
        margin: 0;
        font-size: 24px;
        color: #00ffff;
      }
      #gameover {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        display: none;
        background: rgba(10, 10, 25, 0.9);
        padding: 40px;
        border: 2px solid #00ffff;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        z-index: 20;
      }
      #gameover h2 {
        margin-top: 0;
        color: #ff0055;
        font-size: 36px;
      }
      button {
        margin-top: 20px;
        padding: 12px 24px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        background: #00ffff;
        color: #000;
        border: none;
        border-radius: 8px;
        transition: transform 0.1s, background 0.2s;
      }
      button:hover {
        background: #fff;
        transform: scale(1.05);
      }
      button:active {
        transform: scale(0.95);
      }
      #controls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.5);
        pointer-events: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1>Punkte: <span id="score">0</span></h1>
    </div>
    
    <div id="gameover">
      <h2>Game Over!</h2>
      <p>Deine Punkte: <span id="finalScore">0</span></p>
      <button id="restartBtn">Neustart</button>
    </div>

    <div id="controls">
      Steuerung: Pfeiltasten Links / Rechts oder A / D
    </div>

    <!-- Das gesamte Spiel in einem Module-Script -->
    <script type="module">
      import * as THREE from 'three/webgpu';
      import { color, time, positionLocal, oscSine, uv, vec2 } from 'three/tsl';

      // --- 1. Setup WebGPU Renderer ---
      const renderer = new THREE.WebGPURenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050510);
      scene.fog = new THREE.FogExp2(0x050510, 0.03);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 4, 8);
      camera.lookAt(0, 0, 0);

      // --- 2. Beleuchtung ---
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);
      
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      // --- 3. TSL (Three.js Shading Language) Materialien ---
      
      // Spieler-Material: Pulsierendes Cyan
      const playerMaterial = new THREE.MeshStandardNodeMaterial();
      playerMaterial.colorNode = color(0x00ffff).mul(oscSine(time.mul(4)).add(1).mul(0.5).add(0.5));
      playerMaterial.emissiveNode = color(0x0088ff).mul(oscSine(time.mul(6)).add(1).mul(0.2));
      playerMaterial.roughness = 0.2;
      playerMaterial.metalness = 0.8;

      // Gegner-Material: Gefährliches Rot/Orange mit UV-Verlauf
      const enemyMaterial = new THREE.MeshStandardNodeMaterial();
      const uvNode = uv();
      // Farbverlauf basierend auf UV und Zeit
      enemyMaterial.colorNode = color(0xff0000).mix(color(0xffaa00), uvNode.y.add(oscSine(time.mul(8)).mul(0.5)));
      enemyMaterial.emissiveNode = color(0xff0000).mul(oscSine(time.mul(10)).add(1).mul(0.3));
      enemyMaterial.roughness = 0.4;

      // Boden-Material: TSL Grid-Effekt
      const floorMaterial = new THREE.MeshStandardNodeMaterial();
      // Erzeuge ein Rastermuster mit TSL
      const gridX = oscSine(positionLocal.x.mul(2));
      const gridZ = oscSine(positionLocal.z.mul(2));
      const grid = gridX.mul(gridZ);
      floorMaterial.colorNode = color(0x0a0a1a).mix(color(0x004488), grid.step(0.1).mul(0.5));
      floorMaterial.roughness = 0.9;

      // --- 4. Objekte erstellen ---
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 100), floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.position.z = -20;
      scene.add(floor);

      const playerGeo = new THREE.BoxGeometry(1.2, 0.8, 1.2);
      const player = new THREE.Mesh(playerGeo, playerMaterial);
      player.position.y = 0.4;
      scene.add(player);

      const enemies = [];
      const enemyGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);

      // --- 5. Spiel-Logik ---
      let score = 0;
      let isGameOver = false;
      let baseSpeed = 15;
      let spawnTimer = null;
      
      const scoreEl = document.getElementById('score');
      const finalScoreEl = document.getElementById('finalScore');
      const gameOverEl = document.getElementById('gameover');
      const restartBtn = document.getElementById('restartBtn');

      // Steuerung
      const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };

      window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
      });
      window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
      });

      function spawnEnemy() {
        if (isGameOver) return;
        
        const enemy = new THREE.Mesh(enemyGeo, enemyMaterial);
        // Zufällige X-Position zwischen -6 und 6
        enemy.position.set((Math.random() - 0.5) * 12, 0.75, -40);
        
        // Zufällige Rotation
        enemy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
        
        scene.add(enemy);
        enemies.push(enemy);
        
        // Spawngeschwindigkeit erhöht sich mit dem Score
        const spawnDelay = Math.max(300, 1500 - score * 20);
        spawnTimer = setTimeout(spawnEnemy, spawnDelay);
      }

      function startGame() {
        enemies.forEach(e => scene.remove(e));
        enemies.length = 0;
        score = 0;
        baseSpeed = 15;
        player.position.x = 0;
        scoreEl.innerText = score;
        isGameOver = false;
        gameOverEl.style.display = 'none';
        
        if (spawnTimer) clearTimeout(spawnTimer);
        spawnEnemy();
      }

      restartBtn.addEventListener('click', startGame);

      // --- 6. Render Loop ---
      const clock = new THREE.Clock();

      renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();

        if (!isGameOver) {
          // Spieler bewegen
          const moveSpeed = 12 * dt;
          if ((keys.ArrowLeft || keys.a) && player.position.x > -6) player.position.x -= moveSpeed;
          if ((keys.ArrowRight || keys.d) && player.position.x < 6) player.position.x += moveSpeed;

          // Kamera folgt dem Spieler leicht
          camera.position.x = THREE.MathUtils.lerp(camera.position.x, player.position.x * 0.3, dt * 5);
          camera.lookAt(0, 0, -10);

          // Gegner bewegen und Kollision prüfen
          for (let i = enemies.length - 1; i >= 0; i--) {
            const enemy = enemies[i];
            enemy.position.z += baseSpeed * dt;
            enemy.rotation.x += 2 * dt;
            enemy.rotation.y += 1.5 * dt;

            // Einfache AABB Kollisionserkennung
            const distZ = Math.abs(enemy.position.z - player.position.z);
            const distX = Math.abs(enemy.position.x - player.position.x);
            
            if (distZ < 1.2 && distX < 1.2) {
              isGameOver = true;
              finalScoreEl.innerText = score;
              gameOverEl.style.display = 'block';
            }

            // Gegner hinter dem Spieler löschen
            if (enemy.position.z > 10) {
              scene.remove(enemy);
              enemies.splice(i, 1);
              score += 10;
              scoreEl.innerText = score;
              baseSpeed += 0.2; // Spiel wird schneller
            }
          }
        }

        renderer.render(scene, camera);
      });

      // --- 7. Resize Handler ---
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Spiel starten
      startGame();
    </script>
  </body>
</html>
